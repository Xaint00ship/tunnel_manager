name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tunnel-manager-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Test manager
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          ruff check .
          mypy tunnel_manager
          pytest -q

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload manager
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.idea' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude 'config.json' \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:/opt/tunnel_manager/"

      - name: Install and restart manager
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "GITHUB_SHA='$GITHUB_SHA' bash -s" <<'EOF'
          set -euo pipefail
          cd /opt/tunnel_manager
          .venv/bin/python3 -m pip install -r requirements.txt
          .venv/bin/python3 -m py_compile tunnel_manager/*.py tunnel_manager/backends/*.py
          python3 - <<'PY'
          import os
          from pathlib import Path
          path = Path("/opt/tunnel-dashboard/DEPLOYED_COMMITS")
          lines = path.read_text(encoding="utf-8").splitlines() if path.exists() else []
          key = "manager-main"
          value = f"{key} {os.environ['GITHUB_SHA']}"
          lines = [line for line in lines if not line.startswith(f"{key} ")]
          lines.insert(0, value)
          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          systemctl restart tunnel-manager
          sleep 8
          systemctl is-active tunnel-manager
          EOF
