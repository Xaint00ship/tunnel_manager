name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted Publishing — no PyPI token needed once configured at
    #   https://pypi.org/manage/account/publishing/
    # under project name `tunnel-manager`, owner `Xaint00ship`,
    # repo `tunnel_manager`, workflow `release.yml`.
    environment:
      name: pypi
      url: https://pypi.org/p/tunnel-manager
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
